# Argo CD root "app of apps". Apply once after installing Argo CD.
# It watches clusters/learning/apps/ and deploys every child Application there.
# Add a component to the stack = add one file under apps/ = Argo CD picks it up.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: learning-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-user>/ai-infra-upskill.git   # <-- edit
    targetRevision: main
    path: clusters/learning/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
